[build]
builder = "NIXPACKS"
buildCommand = "cd backend && npm install && cd ../frontend && npm install --include=dev && npm run build"

[deploy]
startCommand = "cd backend && node src/migrations/run.js; node src/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

