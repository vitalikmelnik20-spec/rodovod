[build]
builder = "NIXPACKS"
buildCommand = "npm install && cd ../frontend && npm install && npm run build && cd ../backend && npm run migrate"

[deploy]
startCommand = "node src/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[[services]]
name = "rodovod-backend"
